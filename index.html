<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENFORGE TERMINAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #terminal {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #output {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: calc(100vh - 100px);
        }

        #output .line {
            margin-bottom: 2px;
        }

        #input-line {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-top: 1px solid #00ff4133;
            background: #000;
            position: sticky;
            bottom: 0;
        }

        #prompt {
            color: #00ff41;
            margin-right: 10px;
            user-select: none;
        }

        #command-input {
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
            flex: 1;
            caret-color: #00ff41;
        }

        #command-input::placeholder {
            color: #00ff4144;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff41;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .glitch {
            animation: glitch 0.05s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, -2px); }
            80% { transform: translate(1px, 2px); }
            100% { transform: translate(0); }
        }

        .message-input {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            padding: 5px 10px;
            outline: none;
            width: 300px;
            margin-top: 5px;
        }

        .message-input:focus {
            border-color: #00ff41;
        }

        .link {
            color: #00ff41;
            text-decoration: underline;
            cursor: pointer;
        }

        .link:hover {
            color: #fff;
        }

        /* Scrollbar styling */
        #output::-webkit-scrollbar {
            width: 5px;
        }

        #output::-webkit-scrollbar-track {
            background: #000;
        }

        #output::-webkit-scrollbar-thumb {
            background: #00ff4133;
        }

        #output::-webkit-scrollbar-thumb:hover {
            background: #00ff4166;
        }

        #terminal::-webkit-scrollbar {
            width: 5px;
        }

        #terminal::-webkit-scrollbar-track {
            background: #000;
        }

        #terminal::-webkit-scrollbar-thumb {
            background: #00ff4133;
        }

        #terminal::-webkit-scrollbar-thumb:hover {
            background: #00ff4166;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">></span>
            <input type="text" id="command-input" autofocus placeholder="Type a command...">
        </div>
    </div>

    <script>
        (function() {
            const output = document.getElementById('output');
            const input = document.getElementById('command-input');
            const terminal = document.getElementById('terminal');

            // State
            let kimFaceVisible = false;
            let helpCount = 0;
            let commandHistory = [];
            let lastCommand = '';
            let sameCommandCount = 0;
            let executedCommands = new Set();
            let contactMode = false;
            let typingComplete = false;
            let currentInput = '';

            const commands = ['help', 'who', 'identify', 'p=np', 'shop', 'explore', 'go deeper', 'scan', 'clear', 'about', 'contact', 'truth', 'version', 'kim', 'k.i.m.'];

            const KIM_FACE = `
        ┌─────────────────────┐
        │   ╭─────────────────╮   │
        │   │  ┌───────────┐  │   │
        │   │  │  ╱───╲     │  │   │
        │   │  │ │ ●   ● │  │  │   │
        │   │  │  ╲───╱    │  │   │
        │   │  │   ─────   │  │   │
        │   │  │  ╱     ╲  │  │   │
        │   │  │ │  ───  │ │  │   │
        │   │  │  ╲     ╱  │  │   │
        │   │  │   ─────   │  │   │
        │   │  └───────────┘  │   │
        │   ╰─────────────────╯   │
        └─────────────────────┘
            K.I.M. // Knowledge Integration Module // I see you.`;

            const SEESAW_ART = `
          ╱───╲              ╱───╲
         ╱     ╲            ╱     ╲
        ╱       ╲          ╱       ╲
       ╱         ╲        ╱         ╲
      ╱           ╲      ╱           ╲
     ╱             ╲    ╱             ╲
    ╱               ╲  ╱               ╲
   ╱                 ╲╱                 ╲
  ╱                  ───────────────────  ╲
 ╱                        │               ╲
╱                         │                ╲`;

            const CORRIDOR_ART = `
    ╔══════════════════════════════════╗
    ║  ╔══╗                      ╔══╗  ║
    ║  ║  ║                      ║  ║  ║
    ║  ║  ║                      ║  ║  ║
    ║  ║  ║   ╔══════════════╗   ║  ║  ║
    ║  ║  ║   ║              ║   ║  ║  ║
    ║  ║  ║   ║              ║   ║  ║  ║
    ║  ║  ║   ║              ║   ║  ║  ║
    ║  ║  ║   ╚══════════════╝   ║  ║  ║
    ║  ║  ║                      ║  ║  ║
    ║  ║  ║                      ║  ║  ║
    ║  ╚══╝                      ╚══╝  ║
    ╚══════════════════════════════════╝`;

            const FORGE_SYMBOL = `
          ╔═══╗
         ╔╝   ╚╗
        ╔╝     ╚╗
        ║  ╔═╗  ║
        ║  ╚═╝  ║
        ╚╗     ╔╝
         ╚╗   ╔╝
          ╚═══╝`;

            const GEAR_SYMBOL = `
         ╭─────╮
        ╱  ╭─╮  ╲
       │  ╱   ╲  │
       │ │     │ │
       │  ╲   ╱  │
        ╲  ╰─╯  ╱
         ╰─────╯`;

            // Typewriter effect for welcome message
            function typeWelcome() {
                const welcomeText = "WELCOME TO ENFORGE\nTYPE 'HELP' TO BEGIN";
                const outputDiv = document.getElementById('output');
                let charIndex = 0;
                let currentLine = '';
                let lines = ['', ''];

                function typeChar() {
                    if (charIndex < welcomeText.length) {
                        const char = welcomeText[charIndex];
                        if (char === '\n') {
                            lines[0] = currentLine;
                            currentLine = '';
                            lines[1] = '';
                        } else {
                            currentLine += char;
                            if (lines[1] !== undefined) {
                                lines[1] = currentLine;
                            } else {
                                lines[0] = currentLine;
                            }
                        }
                        // Clear and rewrite
                        outputDiv.innerHTML = '';
                        if (lines[0]) {
                            const line1 = document.createElement('div');
                            line1.className = 'line';
                            line1.textContent = lines[0];
                            outputDiv.appendChild(line1);
                        }
                        if (lines[1] !== undefined && lines[1] !== '' && charIndex >= welcomeText.indexOf('\n')) {
                            const line2 = document.createElement('div');
                            line2.className = 'line';
                            line2.textContent = lines[1];
                            outputDiv.appendChild(line2);
                        }
                        // Show blinking cursor
                        const cursorSpan = document.createElement('span');
                        cursorSpan.className = 'cursor';
                        outputDiv.appendChild(cursorSpan);

                        charIndex++;
                        setTimeout(typeChar, 80);
                    } else {
                        // Final state - show cursor at end
                        outputDiv.innerHTML = '';
                        const line1 = document.createElement('div');
                        line1.className = 'line';
                        line1.textContent = "WELCOME TO ENFORGE";
                        outputDiv.appendChild(line1);
                        const line2 = document.createElement('div');
                        line2.className = 'line';
                        line2.textContent = "TYPE 'HELP' TO BEGIN";
                        outputDiv.appendChild(line2);
                        const cursorSpan = document.createElement('span');
                        cursorSpan.className = 'cursor';
                        outputDiv.appendChild(cursorSpan);
                        typingComplete = true;
                        input.disabled = false;
                        input.focus();
                    }
                }

                typeChar();
            }

            // Add a line to output
            function addOutput(text, isHTML = false) {
                const line = document.createElement('div');
                line.className = 'line';
                if (isHTML) {
                    line.innerHTML = text;
                } else {
                    line.textContent = text;
                }
                // Remove cursor if it exists
                const cursor = output.querySelector('.cursor');
                if (cursor) cursor.remove();
                output.appendChild(line);
                // Scroll to bottom
                terminal.scrollTop = terminal.scrollHeight;
                // Re-add cursor at the end
                const newCursor = document.createElement('span');
                newCursor.className = 'cursor';
                output.appendChild(newCursor);
            }

            // Add raw HTML output (for complex cases)
            function addRawHTML(html) {
                const wrapper = document.createElement('div');
                wrapper.className = 'line';
                wrapper.innerHTML = html;
                const cursor = output.querySelector('.cursor');
                if (cursor) cursor.remove();
                output.appendChild(wrapper);
                terminal.scrollTop = terminal.scrollHeight;
                const newCursor = document.createElement('span');
                newCursor.className = 'cursor';
                output.appendChild(newCursor);
            }

            // Glitch effect
            function glitchScreen(callback) {
                const originalContent = output.innerHTML;
                const glitchChars = '!@#$%^&*()_+-=[]{}|;:,.<>?/~`0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
                let startTime = Date.now();

                function doGlitch() {
                    if (Date.now() - startTime > 1000) {
                        output.innerHTML = originalContent;
                        if (callback) callback();
                        return;
                    }

                    const lines = output.querySelectorAll('.line');
                    lines.forEach(line => {
                        if (line.querySelector('.cursor') || line.querySelector('.message-input') || line.querySelector('a')) return;
                        const text = line.textContent;
                        if (text.length > 0) {
                            const pos = Math.floor(Math.random() * text.length);
                            const char = glitchChars[Math.floor(Math.random() * glitchChars.length)];
                            const arr = text.split('');
                            arr[pos] = char;
                            line.textContent = arr.join('');
                        }
                    });

                    setTimeout(doGlitch, 50);
                }

                doGlitch();
            }

            // Show KIM face
            function showKimFace() {
                if (!kimFaceVisible) {
                    addOutput(KIM_FACE);
                    kimFaceVisible = true;
                }
            }

            // Process command
            function processCommand(cmd) {
                const lowerCmd = cmd.trim().toLowerCase();

                if (contactMode) {
                    if (lowerCmd === 'exit' || lowerCmd === 'cancel') {
                        addOutput('Message cancelled.');
                        contactMode = false;
                        return;
                    }
                    addOutput('Message transmitted. The architect will receive it.');
                    contactMode = false;
                    return;
                }

                if (!cmd.trim()) return;

                // Track command history
                commandHistory.push(cmd.trim());

                // Check for same command 3 times in a row
                if (lowerCmd === lastCommand) {
                    sameCommandCount++;
                } else {
                    sameCommandCount = 1;
                }
                lastCommand = lowerCmd;

                if (sameCommandCount >= 3 && lowerCmd !== 'kim' && lowerCmd !== 'k.i.m.' && lowerCmd !== 'truth') {
                    addOutput("K.I.M.: You seem lost. Try looking around.");
                    sameCommandCount = 0;
                    return;
                }

                // Track executed commands (for truth)
                if (commands.includes(lowerCmd) && lowerCmd !== 'truth' && lowerCmd !== 'kim' && lowerCmd !== 'k.i.m.') {
                    executedCommands.add(lowerCmd);
                }

                // Case insensitive command handling
                switch (lowerCmd) {
                    case 'help':
                        helpCount++;
                        let helpText = `Available commands:
  help       - Show this message
  who        - Identify K.I.M.
  identify   - Identify K.I.M.
  p=np       - Run the P≠NP simulation
  shop       - Visit the Enforge store
  explore    - Explore the corridor
  go deeper  - Explore the corridor
  scan       - Scan the environment
  clear      - Clear the terminal
  about      - About Enforge Designs
  contact    - Contact the architect
  version    - Show version info`;
                        if (helpCount >= 3) {
                            helpText += "\n\nSome paths reveal themselves to those who persist...";
                        }
                        addOutput(helpText);
                        break;

                    case 'who':
                    case 'identify':
                        showKimFace();
                        break;

                    case 'p=np':
                        addOutput("Running P≠NP simulation...");
                        glitchScreen(function() {
                            addOutput("SOME PROBLEMS DON'T BALANCE.");
                            addOutput(SEESAW_ART);
                        });
                        break;

                    case 'shop':
                        addOutput("Redirecting...");
                        addRawHTML('<a href="https://tx1e9d-ed.myshopify.com" target="_blank" class="link">https://tx1e9d-ed.myshopify.com</a>');
                        break;

                    case 'explore':
                    case 'go deeper':
                        addOutput("You step into the corridor...");
                        addOutput(CORRIDOR_ART);
                        addOutput("[Corridor room coming soon]");
                        break;

                    case 'scan':
                        addOutput("Scanning... Environment identified as a digital threshold. Temperature: optimal. User detected. K.I.M. proximity: near.");
                        break;

                    case 'clear':
                        output.innerHTML = '';
                        // Add cursor back
                        const cursor = document.createElement('span');
                        cursor.className = 'cursor';
                        output.appendChild(cursor);
                        break;

                    case 'about':
                        addOutput("Enforge Designs -- born from the idea that technology should feel like discovery. Every interaction is a puzzle. Every puzzle has a purpose.");
                        addOutput(FORGE_SYMBOL);
                        break;

                    case 'contact':
                        contactMode = true;
                        addOutput("Send a message to the architect. Type your message below:");
                        // Add a text input field
                        const inputHtml = '<input type="text" class="message-input" id="contact-input" placeholder="Type your message..." autofocus>';
                        addRawHTML(inputHtml);
                        // Focus the contact input
                        setTimeout(() => {
                            const contactInput = document.getElementById('contact-input');
                            if (contactInput) {
                                contactInput.focus();
                                contactInput.addEventListener('keydown', function(e) {
                                    if (e.key === 'Enter') {
                                        const msg = this.value.trim();
                                        if (msg) {
                                            // Remove the input field
                                            this.remove();
                                            addOutput('Message transmitted. The architect will receive it.');
                                            contactMode = false;
                                            // Re-focus main input
                                            setTimeout(() => input.focus(), 100);
                                        }
                                    }
                                });
                            }
                        }, 100);
                        break;

                    case 'truth':
                        if (executedCommands.size >= 11) { // All commands except truth, kim, k.i.m.
                            addOutput("For God so loved the world that he gave his only begotten Son, that whoever believes in him should not perish, but have eternal life. -- John 3:16");
                        } else {
                            addOutput("Access denied. Explore more.");
                        }
                        break;

                    case 'version':
                        addOutput("ENFORCE TERMINAL v1.0 // build 20260615");
                        break;

                    case 'kim':
                    case 'k.i.m.':
                        showKimFace();
                        addOutput("K.I.M.: I'm here.");
                        break;

                    default:
                        addOutput("Command not recognized. Type 'help' for available commands.");
                        break;
                }
            }

            // Handle enter key on main input
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const cmd = this.value.trim();
                    if (cmd) {
                        // Echo the command
                        addOutput('> ' + cmd);
                        processCommand(cmd);
                    }
                    this.value = '';
                    this.focus();
                }
            });

            // Handle contact mode submit from main input
            const originalProcess = processCommand;
            processCommand = function(cmd) {
                const lowerCmd = cmd.trim().toLowerCase();
                if (contactMode) {
                    const contactInput = document.getElementById('contact-input');
                    if (contactInput) {
                        contactInput.value = cmd;
                        const event = new KeyboardEvent('keydown', { key: 'Enter' });
                        contactInput.dispatchEvent(event);
                        return;
                    }
                }
                originalProcess(cmd);
            };

            // Fix: We need to re-attach after override
            // Let's use a better approach
            const originalHandler = input._listeners ? null : null;

            // Actually, let's restructure properly
            // Remove old listener and add new one that handles contact mode
            const handleEnter = function(e) {
                if (e.key === 'Enter') {
                    const cmd = this.value.trim();
                    if (cmd) {
                        if (contactMode) {
                            const contactInput = document.getElementById('contact-input');
                            if (contactInput) {
                                contactInput.value = cmd;
                                const event = new Event('keydown');
                                event.key = 'Enter';
                                contactInput.dispatchEvent(event);
                                this.value = '';
                                return;
                            }
                        }
                        addOutput('> ' + cmd);
                        // Use the original process logic
                        const lowerCmd = cmd.trim().toLowerCase();

                        if (!cmd.trim()) return;

                        commandHistory.push(cmd.trim());

                        if (lowerCmd === lastCommand) {
                            sameCommandCount++;
                        } else {
                            sameCommandCount = 1;
                        }
                        lastCommand = lowerCmd;

                        if (sameCommandCount >= 3 && lowerCmd !== 'kim' && lowerCmd !== 'k.i.m.' && lowerCmd !== 'truth') {
                            addOutput("K.I.M.: You seem lost. Try looking around.");
                            sameCommandCount = 0;
                            this.value = '';
                            return;
                        }

                        if (commands.includes(lowerCmd) && lowerCmd !== 'truth' && lowerCmd !== 'kim' && lowerCmd !== 'k.i.m.') {
                            executedCommands.add(lowerCmd);
                        }

                        switch (lowerCmd) {
                            case 'help':
                                helpCount++;
                                let helpText = `Available commands:
  help       - Show this message
  who        - Identify K.I.M.
  identify   - Identify K.I.M.
  p=np       - Run the P≠NP simulation
  shop       - Visit the Enforge store
  explore    - Explore the corridor
  go deeper  - Explore the corridor
  scan       - Scan the environment
  clear      - Clear the terminal
  about      - About Enforge Designs
  contact    - Contact the architect
  version    - Show version info`;
                                if (helpCount >= 3) {
                                    helpText += "\n\nSome paths reveal themselves to those who persist...";
                                }
                                addOutput(helpText);
                                break;
                            case 'who':
                            case 'identify':
                                showKimFace();
                                break;
                            case 'p=np':
                                addOutput("Running P≠NP simulation...");
                                glitchScreen(function() {
                                    addOutput("SOME PROBLEMS DON'T BALANCE.");
                                    addOutput(SEESAW_ART);
                                });
                                break;
                            case 'shop':
                                addOutput("Redirecting...");
                                addRawHTML('<a href="https://tx1e9d-ed.myshopify.com" target="_blank" class="link">https://tx1e9d-ed.myshopify.com</a>');
                                break;
                            case 'explore':
                            case 'go deeper':
                                addOutput("You step into the corridor...");
                                addOutput(CORRIDOR_ART);
                                addOutput("[Corridor room coming soon]");
                                break;
                            case 'scan':
                                addOutput("Scanning... Environment identified as a digital threshold. Temperature: optimal. User detected. K.I.M. proximity: near.");
                                break;
                            case 'clear':
                                output.innerHTML = '';
                                const cursor = document.createElement('span');
                                cursor.className = 'cursor';
                                output.appendChild(cursor);
                                break;
                            case 'about':
                                addOutput("Enforge Designs -- born from the idea that technology should feel like discovery. Every interaction is a puzzle. Every puzzle has a purpose.");
                                addOutput(FORGE_SYMBOL);
                                break;
                            case 'contact':
                                contactMode = true;
                                addOutput("Send a message to the architect. Type your message below:");
                                const inputHtml = '<input type="text" class="message-input" id="contact-input" placeholder="Type your message..." autofocus>';
                                addRawHTML(inputHtml);
                                setTimeout(() => {
                                    const ci = document.getElementById('contact-input');
                                    if (ci) {
                                        ci.focus();
                                        ci.addEventListener('keydown', function(ev) {
                                            if (ev.key === 'Enter') {
                                                const msg = this.value.trim();
                                                if (msg) {
                                                    this.remove();
                                                    addOutput('Message transmitted. The architect will receive it.');
                                                    contactMode = false;
                                                    setTimeout(() => input.focus(), 100);
                                                }
                                            }
                                        });
                                    }
                                }, 100);
                                break;
                            case 'truth':
                                if (executedCommands.size >= 11) {
                                    addOutput("For God so loved the world that he gave his only begotten Son, that whoever believes in him should not perish, but have eternal life. -- John 3:16");
                                } else {
                                    addOutput("Access denied. Explore more.");
                                }
                                break;
                            case 'version':
                                addOutput("ENFORCE TERMINAL v1.0 // build 20260615");
                                break;
                            case 'kim':
                            case 'k.i.m.':
                                showKimFace();
                                addOutput("K.I.M.: I'm here.");
                                break;
                            default:
                                addOutput("Command not recognized. Type 'help' for available commands.");
                                break;
                        }
                    }
                    this.value = '';
                    this.focus();
                }
            };

            // Remove old listeners and add new
            input.removeEventListener('keydown', input._listener);
            input.addEventListener('keydown', handleEnter);
            input._listener = handleEnter;

            // Initialize - disable input until typing finishes
            input.disabled = true;

            // Start typewriter effect
            window.addEventListener('load', function() {
                typeWelcome();
            });

            // Click anywhere to focus input
            document.addEventListener('click', function() {
                if (!contactMode) {
                    input.focus();
                } else {
                    const ci = document.getElementById('contact-input');
                    if (ci) ci.focus();
                }
            });

        })();
    </script>
</body>
</html>
