<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enforge Terminal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #terminal {
            background-color: #0a0a1a;
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }
        #output {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #00ff41;
            font-size: 14px;
            line-height: 1.6;
        }
        #input-line {
            display: flex;
            align-items: center;
        }
        .prompt {
            color: #00ff41;
            margin-right: 10px;
        }
        #user-input {
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            width: 100%;
            outline: none;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output">
            <div>Welcome to Enforge Terminal v1.0.0</div>
            <div>Type 'help' for available commands</div>
            <div>---</div>
        </div>
        <div id="input-line">
            <span class="prompt">$</span>
            <input type="text" id="user-input" autofocus>
        </div>
    </div>
    <script>
        const output = document.getElementById('output');
        const userInput = document.getElementById('user-input');
        
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const command = userInput.value;
                output.innerHTML += `<div>$ ${command}</div>`;
                processCommand(command);
                userInput.value = '';
                output.scrollTop = output.scrollHeight;
            }
        });
        
        function processCommand(cmd) {
            const cmdLower = cmd.toLowerCase().trim();
            if (cmdLower === 'help') {
                output.innerHTML += `<div>Available commands: help, about, clear, whoami, date, echo</div>`;
            } else if (cmdLower === 'about') {
                output.innerHTML += `<div>Enforge Terminal - A retro terminal experience</div>`;
            } else if (cmdLower === 'clear') {
                output.innerHTML = '';
            } else if (cmdLower === 'whoami') {
                output.innerHTML += `<div>guest</div>`;
            } else if (cmdLower === 'date') {
                output.innerHTML += `<div>${new Date().toString()}</div>`;
            } else if (cmdLower.startsWith('echo ')) {
                output.innerHTML += `<div>${cmd.substring(5)}</div>`;
            } else {
                output.innerHTML += `<div>Command not found: ${cmd}</div>`;
            }
        }
    </script>
</body>
</html>
