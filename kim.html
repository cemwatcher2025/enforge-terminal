<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.I.M. -- Knowledge Integration Module</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #00ccff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: none;
        }
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #00ccff;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #00ccff;
            padding: 5px 10px;
            background: rgba(0,0,0,0.8);
            cursor: pointer;
        }
        .back-link:hover {
            background: #00ccff;
            color: #000;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .kim-wrapper {
            position: relative;
            width: 400px;
            height: 500px;
            transition: transform 0.15s ease-out;
        }
        .kim-wrapper::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border: 1px solid rgba(0, 204, 255, 0.1);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
        }
        .kim-wrapper::after {
            content: '';
            position: absolute;
            top: -40px;
            left: -40px;
            right: -40px;
            bottom: -40px;
            border: 1px solid rgba(0, 204, 255, 0.05);
            border-radius: 50%;
            animation: pulse 6s ease-in-out infinite reverse;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.6; }
        }
        .kim-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 8px rgba(0, 204, 255, 0.6))
                    drop-shadow(0 0 20px rgba(0, 204, 255, 0.3))
                    drop-shadow(0 0 40px rgba(0, 204, 255, 0.1));
        }
        .kim-svg line,
        .kim-svg path,
        .kim-svg circle,
        .kim-svg ellipse,
        .kim-svg polyline {
            stroke: #00ccff;
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .kim-svg .eye-glow {
            fill: #00ccff;
            filter: drop-shadow(0 0 6px #00ccff);
            animation: eyeBlink 5s ease-in-out infinite;
        }
        @keyframes eyeBlink {
            0%, 48%, 52%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .kim-svg .mouth {
            stroke-width: 1;
            stroke: rgba(0, 204, 255, 0.7);
        }
        .kim-svg .hair-line {
            stroke-width: 0.8;
            stroke: rgba(0, 204, 255, 0.5);
        }
        .kim-svg .face-outline {
            stroke-width: 2;
        }
        .status-text {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            letter-spacing: 8px;
            color: rgba(0, 204, 255, 0.6);
            text-align: center;
            animation: fadeInOut 3s ease-in-out infinite;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        .cursor-tracker {
            position: fixed;
            width: 8px;
            height: 8px;
            border: 1px solid #00ccff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transition: transform 0.05s ease-out;
            box-shadow: 0 0 6px rgba(0, 204, 255, 0.5);
        }
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 204, 255, 0.02) 2px,
                rgba(0, 204, 255, 0.02) 4px
            );
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            width: 1px;
            height: 1px;
            background: #00ccff;
            border-radius: 50%;
            opacity: 0;
            animation: float 8s infinite;
        }
        @keyframes float {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1); }
        }
    </style>
</head>
<body>
    <a href="corridor.html" class="back-link">&lt; RETURN TO CORRIDOR</a>
    
    <div class="scanlines"></div>
    <div class="particles" id="particles"></div>
    <div class="cursor-tracker" id="cursor"></div>
    
    <div class="container">
        <div class="kim-wrapper" id="kim-wrapper">
            <svg class="kim-svg" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
                <!-- Hair / wireframe crown -->
                <path class="hair-line" d="M 120 180 Q 100 120 140 80 Q 200 40 260 80 Q 300 120 280 180" />
                <path class="hair-line" d="M 140 100 Q 200 60 260 100" />
                <path class="hair-line" d="M 160 70 Q 200 50 240 70" />
                <line class="hair-line" x1="200" y1="50" x2="200" y2="30" />
                <line class="hair-line" x1="180" y1="55" x2="170" y2="35" />
                <line class="hair-line" x1="220" y1="55" x2="230" y2="35" />
                
                <!-- Face outline -->
                <path class="face-outline" d="M 120 180 
                         Q 110 240 115 300 
                         Q 120 360 140 400 
                         Q 170 440 200 450 
                         Q 230 440 260 400 
                         Q 280 360 285 300 
                         Q 290 240 280 180 
                         Q 260 140 200 130 
                         Q 140 140 120 180 Z" />
                
                <!-- Jaw / chin detail -->
                <path class="face-outline" d="M 140 400 Q 200 430 260 400" />
                
                <!-- Cheekbones -->
                <line class="hair-line" x1="125" y1="280" x2="145" y2="290" />
                <line class="hair-line" x1="275" y1="280" x2="255" y2="290" />
                
                <!-- Nose -->
                <line x1="200" y1="220" x2="200" y2="320" />
                <line x1="200" y1="320" x2="185" y2="340" />
                <line x1="200" y1="320" x2="215" y2="340" />
                <line x1="185" y1="340" x2="215" y2="340" />
                
                <!-- Eyes -->
                <ellipse class="eye-glow" cx="165" cy="240" rx="18" ry="12" />
                <ellipse class="eye-glow" cx="235" cy="240" rx="18" ry="12" />
                
                <!-- Eye wireframe detail -->
                <ellipse cx="165" cy="240" rx="22" ry="15" />
                <ellipse cx="235" cy="240" rx="22" ry="15" />
                <line x1="143" y1="240" x2="130" y2="235" />
                <line x1="257" y1="240" x2="270" y2="235" />
                
                <!-- Eyebrows -->
                <path class="hair-line" d="M 145 215 Q 165 205 185 218" />
                <path class="hair-line" d="M 215 218 Q 235 205 255 215" />
                
                <!-- Mouth -->
                <path class="mouth" d="M 175 380 Q 200 395 225 380" />
                <line class="mouth" x1="185" y1="385" x2="215" y2="385" />
                
                <!-- Neck -->
                <line x1="170" y1="450" x2="160" y2="500" />
                <line x1="230" y1="450" x2="240" y2="500" />
                <line x1="160" y1="500" x2="240" y2="500" />
                
                <!-- Shoulders hint -->
                <path class="hair-line" d="M 120 500 Q 80 520 60 540" />
                <path class="hair-line" d="M 280 500 Q 320 520 340 540" />
                
                <!-- Decorative grid lines on face -->
                <line class="hair-line" x1="200" y1="130" x2="200" y2="180" />
                <line class="hair-line" x1="150" y1="200" x2="250" y2="200" />
                <line class="hair-line" x1="140" y1="320" x2="260" y2="320" />
                
                <!-- Hologram flicker overlay (subtle crosshatch) -->
                <line class="hair-line" x1="120" y1="150" x2="130" y2="160" opacity="0.3" />
                <line class="hair-line" x1="270" y1="170" x2="280" y2="180" opacity="0.3" />
                <line class="hair-line" x1="140" y1="420" x2="150" y2="430" opacity="0.3" />
                <line class="hair-line" x1="250" y1="410" x2="260" y2="420" opacity="0.3" />
            </svg>
        </div>
    </div>
    
    <div class="status-text" id="status">K.I.M. IS WATCHING</div>
    
    <script>
        // Create floating particles
        (function() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (6 + Math.random() * 6) + 's';
                container.appendChild(particle);
            }
        })();
        
        // Mouse tracking for head movement and custom cursor
        const wrapper = document.getElementById('kim-wrapper');
        const cursor = document.getElementById('cursor');
        const status = document.getElementById('status');
        const messages = [
            'K.I.M. IS WATCHING',
            'TRACKING CURSOR...',
            'ANALYZING PATTERN',
            'CONNECTION STABLE',
            'I SEE YOU'
        ];
        let msgIndex = 0;
        
        setInterval(() => {
            msgIndex = (msgIndex + 1) % messages.length;
            status.textContent = messages[msgIndex];
        }, 4000);
        
        document.addEventListener('mousemove', (e) => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx;
            const dy = (e.clientY - cy) / cy;
            
            // Move custom cursor
            cursor.style.left = (e.clientX - 4) + 'px';
            cursor.style.top = (e.clientY - 4) + 'px';
            
            // Subtle head tilt and shift following the cursor
            const rotateX = dy * -8;
            const rotateY = dx * 12;
            const translateX = dx * 15;
            const translateY = dy * 10;
            
            wrapper.style.transform = 
                'translate(' + translateX + 'px, ' + translateY + 'px) ' +
                'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
        });
        
        // Random hologram flicker
        setInterval(() => {
            const svg = document.querySelector('.kim-svg');
            const flicker = 0.7 + Math.random() * 0.3;
            svg.style.opacity = flicker;
        }, 100);
    </script>
</body>
</html>
