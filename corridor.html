<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corridor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: #1a1410;
      color: #e8ddd0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .corridor {
      display: flex;
      gap: 60px;
      padding: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .door {
      width: 200px;
      height: 320px;
      background: linear-gradient(135deg, #4a3228, #3a251c);
      border: 4px solid #6b4c3b;
      border-radius: 8px 8px 0 0;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      overflow: visible;
    }

    .door:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 32px rgba(0,0,0,0.7);
    }

    .door.unlocked {
      border-color: #c8a96e;
      box-shadow: 0 0 20px rgba(200,169,110,0.3);
    }

    .door .label {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 14px;
      letter-spacing: 1px;
      color: #b8a088;
      pointer-events: none;
    }

    .door.unlocked .label {
      color: #c8a96e;
    }

    .knocker-ring {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      border: 3px solid #8a7a6a;
      border-radius: 50%;
      pointer-events: none;
      transition: border-color 0.3s ease;
    }

    .door.unlocked .knocker-ring {
      border-color: #c8a96e;
    }

    .door.locked .knocker-ring {
      border-color: #6b4c3b;
    }

    .message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      color: #e8ddd0;
      border: 1px solid #6b4c3b;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .message.show {
      opacity: 1;
    }

    @keyframes doorShake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(1deg); }
      75% { transform: rotate(-1deg); }
    }

    .door.shake {
      animation: doorShake 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="corridor" id="corridor"></div>
  <div class="message" id="message"></div>

  <script>
    const DOOR_STATES = {
      about: { name: 'About', unlocked: false },
      projects: { name: 'Projects', unlocked: false },
      contact: { name: 'Contact', unlocked: false }
    };

    // Load saved door states from localStorage
    function loadDoorState() {
      try {
        const saved = localStorage.getItem('corridorDoorStates');
        if (saved) {
          const parsed = JSON.parse(saved);
          for (const key in parsed) {
            if (DOOR_STATES[key] !== undefined) {
              DOOR_STATES[key].unlocked = parsed[key].unlocked;
            }
          }
        }
      } catch (e) {
        console.warn('Failed to load door states:', e);
      }
    }

    // Save current door states to localStorage
    function saveDoorState() {
      try {
        localStorage.setItem('corridorDoorStates', JSON.stringify(DOOR_STATES));
      } catch (e) {
        console.warn('Failed to save door states:', e);
      }
    }

    loadDoorState();

    const corridor = document.getElementById('corridor');
    const messageEl = document.getElementById('message');

    function showMessage(text) {
      messageEl.textContent = text;
      messageEl.classList.add('show');
      setTimeout(() => messageEl.classList.remove('show'), 2000);
    }

    function unlockDoor(key) {
      if (!DOOR_STATES[key]) return;
      if (DOOR_STATES[key].unlocked) {
        showMessage(`The ${DOOR_STATES[key].name} door is already unlocked.`);
        return;
      }
      DOOR_STATES[key].unlocked = true;
      saveDoorState();
      renderDoors();
      showMessage(`✨ The ${DOOR_STATES[key].name} door swings open!`);
    }

    function renderDoors() {
      corridor.innerHTML = '';
      for (const [key, state] of Object.entries(DOOR_STATES)) {
        const door = document.createElement('div');
        door.className = 'door' + (state.unlocked ? ' unlocked' : ' locked');
        door.dataset.key = key;

        const knocker = document.createElement('div');
        knocker.className = 'knocker-ring';
        door.appendChild(knocker);

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = state.name;
        door.appendChild(label);

        door.addEventListener('click', () => {
          if (state.unlocked) {
            showMessage(`The ${state.name} door is already open.`);
            return;
          }
          door.classList.add('shake');
          setTimeout(() => door.classList.remove('shake'), 300);

          // 40% chance to unlock on knock
          if (Math.random() < 0.4) {
            unlockDoor(key);
          } else {
            showMessage(`*knock knock* ... Nothing happens. Try again.`);
          }
        });

        corridor.appendChild(door);
      }
    }

    // Restore visual state on page load for already unlocked doors
    document.addEventListener('DOMContentLoaded', () => {
      renderDoors();
      for (const [key, state] of Object.entries(DOOR_STATES)) {
        if (state.unlocked) {
          showMessage(`Welcome back! The ${state.name} door is still open.`);
        }
      }
    });
  </script>
</body>
</html>
